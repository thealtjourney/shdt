name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref so the latest commit wins
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────
  # Backend: lint, type-check, run pytest
  # ────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: shdt
          POSTGRES_PASSWORD: shdt_dev_password
          POSTGRES_DB: shdt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shdt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://shdt:shdt_dev_password@localhost:5432/shdt_test
      DATABASE_URL: postgresql://shdt:shdt_dev_password@localhost:5432/shdt_test
      LOG_LEVEL: WARNING
      DEPLOY_ENV: ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            server/requirements.txt
            server/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        working-directory: server
        run: ruff check .
        continue-on-error: true  # Allow soft-fail until lint debt is paid down

      - name: Type-check with mypy
        working-directory: server
        run: mypy --ignore-missing-imports observability config storage
        continue-on-error: true

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U shdt && break
            sleep 1
          done

      - name: Apply database schema
        working-directory: server
        env:
          PGPASSWORD: shdt_dev_password
        run: |
          psql -h localhost -U shdt -d shdt_test -f ../database/init.sql || true
          for f in ../database/migrations/*.sql; do
            psql -h localhost -U shdt -d shdt_test -f "$f" || true
          done

      - name: Run pytest
        working-directory: server
        run: pytest -v --cov --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: server/coverage.xml
          if-no-files-found: ignore

  # ────────────────────────────────────────────
  # Frontend: lint, type-check, run vitest, build
  # ────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint
        continue-on-error: true  # Allow soft-fail until lint debt is paid down

      - name: Type-check
        working-directory: client
        run: npm run typecheck
        continue-on-error: true

      - name: Test
        working-directory: client
        run: npm test

      - name: Build
        working-directory: client
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist
          if-no-files-found: ignore
