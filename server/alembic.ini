; Alembic configuration for SHDT
;
; Run from the server/ directory:
;     alembic upgrade head     # apply all migrations
;     alembic downgrade -1     # roll back one
;     alembic revision --autogenerate -m "description"   # create a new migration
;     alembic current          # show current revision
;     alembic history          # full revision history
;
; Connection string is taken from the DATABASE_URL env var via env.py.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

# Don't include date in revision filenames; we use semantic descriptive names.
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 60

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
