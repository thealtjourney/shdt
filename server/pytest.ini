[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    slow: tests that take more than ~1s
    db: tests that require a real Postgres connection
    integration: tests that hit external services
addopts =
    -ra
    --strict-markers
    --tb=short
