version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: shdt-postgres
    environment:
      POSTGRES_DB: shdt
      POSTGRES_USER: shdt
      POSTGRES_PASSWORD: shdt_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shdt"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shdt-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shdt-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shdt.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - shdt-network

volumes:
  postgres_data:

networks:
  shdt-network:
    driver: bridge
