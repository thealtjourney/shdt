# nginx config for the SHDT frontend container.
# Serves the Vite build output and proxies /api to the backend (when
# BACKEND_URL is configured at container start via the entrypoint).

server {
    listen       8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Reasonable security defaults — hardened further by Azure Front Door /
    # Static Web Apps headers config when deployed.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively (Vite produces hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The runtime config script — never cached so config changes pick up
    # on the next refresh.
    location = /env-config.js {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Health probe used by container orchestrators
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # SPA fallback — anything that isn't a real file/dir routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Custom error pages — keep simple for now
    error_page 404 /index.html;
}
