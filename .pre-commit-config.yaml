# Pre-commit hooks for SHDT.
# Install with: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files

repos:
  # Built-in hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python — Ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^server/
      - id: ruff-format
        files: ^server/

  # Frontend — Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^client/.*\.(ts|tsx|js|jsx|json|md|yml|yaml|html|css)$

  # Markdown — basic lint
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.yaml', '--ignore', 'CHANGELOG.md']
        files: \.md$

  # Bicep — validate syntax (requires Azure CLI installed)
  - repo: local
    hooks:
      - id: bicep-build
        name: bicep build
        language: system
        entry: bash -c 'for f in "$@"; do az bicep build --file "$f" --outdir /tmp/bicep-build || exit 1; done; rm -rf /tmp/bicep-build' --
        files: ^infra/bicep/.*\.bicep$
        pass_filenames: true
